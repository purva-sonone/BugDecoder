services:
  # Backend API (Python/FastAPI)
  - type: web
    plan: free
    name: bug-decoder-api
    env: python
    rootDir: backend
    buildCommand: python -m pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - fromGroup: bug decoder
      - key: DATABASE_NAME
        value: bug_decoder
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: PYTHON_VERSION
        value: 3.11.6

  # Frontend Web App (Next.js)
  - type: web
    plan: free
    name: bug-decoder-web
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - fromGroup: bug decoder
      - key: NEXT_PUBLIC_API_URL
        # Update this to your backend's actual URL after it deploys
        value: https://bug-decoder-api.onrender.com


